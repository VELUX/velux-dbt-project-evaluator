version: 2

models:
- name: fct_data_product_folder_name
  description: >
    List all data products where the data product name does not match the folder name
  data_tests:
    - is_empty:
        config:
          severity: error
- name: fct_data_product_count_featured_models
  description: >
    List all data products where the number of featured models is greater than 5
  data_tests:
    - is_empty:
        config:
          severity: error